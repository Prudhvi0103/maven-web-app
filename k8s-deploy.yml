---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mavenwebappdeployment
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mavenwebapp
  template:
    metadata:
      labels:
        app: mavenwebapp
    spec:
      containers:
      - name: mavenwebappcontainer
        image: vinodses/mavenwebapp
        imagePullPolicy: Always
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: mavenwebappsvc
spec:
  type: ClusterIP   # 🔥 change from LoadBalancer (important for ingress)
  selector:
    app: mavenwebapp
  ports:
  - port: 80
    targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mavenwebapp-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx   # 🔥 important
  rules:
  - host: mavenwebapp.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mavenwebappsvc
            port:
              number: 80
